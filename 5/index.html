<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Skin Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🎮 SKIN MARKET</h1>

    <div class="player-info">
        <span id="coins">💰 Coins: 2500</span>
        <span>👤 ShadowHunter</span>
    </div>
</header>

<div class="controls">
    <input
        type="text"
        id="search"
        placeholder="🔍 Search skin..."
    >

    <button id="lootBtn">
        🎁 OPEN LOOT BOX
    </button>
</div>

<div id="products" class="products"></div>

<h2>🎒 Inventory</h2>
<div id="inventory" class="inventory"></div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
