<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Hacker Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode"> <div class="container">
        <h1 id="main-title">TERMINAL SYSTEM v5.0</h1>
        
        <div class="controls">
            <button onclick="startScan()" id="scan-btn">START SCAN</button>
            <button onclick="toggleTheme()" id="theme-btn">SWITCH THEME</button>
        </div>

        <div id="result-zone">
            <p id="status-text">System Ready...</p>
            <div id="progress-container" style="display: none;">
                <div id="progress-bar"></div>
            </div>
            <ul id="message-list"></ul>
        </div>

        <div id="threat-level" class="hidden">
            THREAT LEVEL: <span id="level-value">NONE</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
