<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --income: #10b981;
            --expense: #ef4444;
            --warning: #f59e0b;
            --border: #475569;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: var(--text-secondary);
            margin-top: 8px;
            font-size: 1.1rem;
        }

        /* Summary Cards */
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .card-icon.income { background: rgba(16, 185, 129, 0.15); }
        .card-icon.expense { background: rgba(239, 68, 68, 0.15); }
        .card-icon.balance { background: rgba(59, 130, 246, 0.15); }

        .card-title {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .card-amount {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 4px;
        }

        .card-amount.income { color: var(--income); }
        .card-amount.expense { color: var(--expense); }
        .card-amount.balance { color: var(--accent); }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* Form Section */
        .form-section {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .type-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .type-btn.active.income {
            border-color: var(--income);
            color: var(--income);
            background: rgba(16, 185, 129, 0.1);
        }

        .type-btn.active.expense {
            border-color: var(--expense);
            color: var(--expense);
            background: rgba(239, 68, 68, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            font-family: inherit;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Transactions List */
        .transactions-section {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .transactions-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .transactions-list::-webkit-scrollbar {
            width: 6px;
        }

        .transactions-list::-webkit-scrollbar-track {
            background: var(--bg-primary);
            border-radius: 3px;
        }

        .transactions-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .transaction-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: var(--bg-primary);
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .transaction-item:hover {
            border-color: var(--border);
        }

        .transaction-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .transaction-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .transaction-icon.income { background: rgba(16, 185, 129, 0.15); }
        .transaction-icon.expense { background: rgba(239, 68, 68, 0.15); }

        .transaction-details h4 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .transaction-details span {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .transaction-amount {
            font-size: 1.1rem;
            font-weight: 700;
            margin-right: 12px;
        }

        .transaction-amount.income { color: var(--income); }
        .transaction-amount.expense { color: var(--expense); }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            color: var(--expense);
            background: rgba(239, 68, 68, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* Chart Section */
        .chart-section {
            grid-column: 1 / -1;
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
            margin-top: 10px;
        }

        .chart-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 40px;
            padding: 30px 0;
            min-height: 250px;
        }

        .chart-bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .chart-bar {
            width: 60px;
            border-radius: 8px 8px 0 0;
            transition: height 0.5s ease;
            position: relative;
        }

        .chart-bar.income { background: linear-gradient(to top, var(--income), #34d399); }
        .chart-bar.expense { background: linear-gradient(to top, var(--expense), #f87171); }
        .chart-bar.balance { background: linear-gradient(to top, var(--accent), #a78bfa); }

        .chart-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .chart-value {
            font-size: 0.8rem;
            color: var(--text-primary);
            font-weight: 600;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 24px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-weight: 500;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success { border-left: 4px solid var(--income); }
        .toast.error { border-left: 4px solid var(--expense); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Finance Tracker</h1>
            <p>Следи приходите и разходите си лесно</p>
        </header>

        <!-- Summary Cards -->
        <div class="summary">
            <div class="card">
                <div class="card-header">
                    <div class="card-icon income">📈</div>
                    <div>
                        <div class="card-title">Общи Приходи</div>
                        <div class="card-amount income" id="totalIncome">0.00 лв.</div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <div class="card-icon expense">📉</div>
                    <div>
                        <div class="card-title">Общи Разходи</div>
                        <div class="card-amount expense" id="totalExpense">0.00 лв.</div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <div class="card-icon balance">💎</div>
                    <div>
                        <div class="card-title">Баланс</div>
                        <div class="card-amount balance" id="balance">0.00 лв.</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Add Transaction Form -->
            <div class="form-section">
                <h2 class="section-title">➕ Нова Транзакция</h2>

                <div class="type-selector">
                    <button class="type-btn income active" onclick="setType('income')">Приход</button>
                    <button class="type-btn expense" onclick="setType('expense')">Разход</button>
                </div>

                <form id="transactionForm" onsubmit="addTransaction(event)">
                    <div class="form-group">
                        <label for="description">Описание</label>
                        <input type="text" id="description" placeholder="Напр. Заплата, Наем..." required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="amount">Сума (лв.)</label>
                            <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="category">Категория</label>
                            <select id="category" required>
                                <option value="">Избери...</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="date">Дата</label>
                        <input type="date" id="date" required>
                    </div>

                    <button type="submit" class="btn-primary">Добави Транзакция</button>
                </form>
            </div>

            <!-- Transactions List -->
            <div class="transactions-section">
                <h2 class="section-title">📋 История</h2>

                <div class="filter-bar">
                    <button class="filter-btn active" onclick="filterTransactions('all')">Всички</button>
                    <button class="filter-btn" onclick="filterTransactions('income')">Приходи</button>
                    <button class="filter-btn" onclick="filterTransactions('expense')">Разходи</button>
                </div>

                <div class="transactions-list" id="transactionsList">
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>Все още няма транзакции</p>
                        <p style="font-size: 0.85rem; margin-top: 4px;">Добави първата си транзакция отляво</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="chart-section">
            <h2 class="section-title">📊 Визуализация</h2>
            <div class="chart-container" id="chartContainer">
                <div class="empty-state" style="grid-column: 1 / -1;">
                    <div class="empty-state-icon">📊</div>
                    <p>Няма достатъчно данни за графика</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ========== STATE ==========
        let transactions = JSON.parse(localStorage.getItem('financeTracker')) || [];
        let currentType = 'income';
        let currentFilter = 'all';

        const categories = {
            income: [
                { value: 'salary', label: '💼 Заплата', icon: '💼' },
                { value: 'freelance', label: '💻 Фрийланс', icon: '💻' },
                { value: 'investment', label: '📈 Инвестиции', icon: '📈' },
                { value: 'gift', label: '🎁 Подарък', icon: '🎁' },
                { value: 'other_income', label: '📌 Друго', icon: '📌' }
            ],
            expense: [
                { value: 'food', label: '🍔 Храна', icon: '🍔' },
                { value: 'transport', label: '🚗 Транспорт', icon: '🚗' },
                { value: 'rent', label: '🏠 Наем', icon: '🏠' },
                { value: 'utilities', label: '⚡ Сметки', icon: '⚡' },
                { value: 'entertainment', label: '🎮 Забавления', icon: '🎮' },
                { value: 'shopping', label: '🛍️ Пазаруване', icon: '🛍️' },
                { value: 'health', label: '💊 Здраве', icon: '💊' },
                { value: 'other_expense', label: '📌 Друго', icon: '📌' }
            ]
        };

        // ========== INIT ==========
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('date').valueAsDate = new Date();
            updateCategoryOptions();
            renderAll();
        });

        // ========== FUNCTIONS ==========
        function setType(type) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.type-btn.${type}`).classList.add('active');
            updateCategoryOptions();
        }

        function updateCategoryOptions() {
            const select = document.getElementById('category');
            select.innerHTML = '<option value="">Избери...</option>';
            categories[currentType].forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.value;
                option.textContent = cat.label;
                select.appendChild(option);
            });
        }

        function addTransaction(e) {
            e.preventDefault();

            const description = document.getElementById('description').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const category = document.getElementById('category').value;
            const date = document.getElementById('date').value;

            if (!description || !amount || !category || !date) {
                showToast('Моля, попълни всички полета!', 'error');
                return;
            }

            const catData = categories[currentType].find(c => c.value === category);

            const transaction = {
                id: Date.now(),
                type: currentType,
                description,
                amount,
                category,
                categoryLabel: catData.label,
                categoryIcon: catData.icon,
                date
            };

            transactions.unshift(transaction);
            saveTransactions();
            renderAll();

            // Reset form
            document.getElementById('description').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('category').value = '';
            document.getElementById('date').valueAsDate = new Date();

            showToast('Транзакцията е добавена успешно!', 'success');
        }

        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            saveTransactions();
            renderAll();
            showToast('Транзакцията е изтрита!', 'success');
        }

        function filterTransactions(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTransactions();
        }

        function saveTransactions() {
            localStorage.setItem('financeTracker', JSON.stringify(transactions));
        }

        // ========== RENDER ==========
        function renderAll() {
            renderSummary();
            renderTransactions();
            renderChart();
        }

        function renderSummary() {
            const income = transactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + t.amount, 0);

            const expense = transactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0);

            const balance = income - expense;

            document.getElementById('totalIncome').textContent = formatMoney(income);
            document.getElementById('totalExpense').textContent = formatMoney(expense);
            document.getElementById('balance').textContent = formatMoney(balance);
        }

        function renderTransactions() {
            const list = document.getElementById('transactionsList');

            let filtered = transactions;
            if (currentFilter !== 'all') {
                filtered = transactions.filter(t => t.type === currentFilter);
            }

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>Няма транзакции в тази категория</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map(t => `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-icon ${t.type}">${t.categoryIcon}</div>
                        <div class="transaction-details">
                            <h4>${escapeHtml(t.description)}</h4>
                            <span>${t.categoryLabel} • ${formatDate(t.date)}</span>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <div class="transaction-amount ${t.type}">
                            ${t.type === 'income' ? '+' : '-'}${formatMoney(t.amount)}
                        </div>
                        <button class="delete-btn" onclick="deleteTransaction(${t.id})" title="Изтрий">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function renderChart() {
            const container = document.getElementById('chartContainer');

            if (transactions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-state-icon">📊</div>
                        <p>Няма достатъчно данни за графика</p>
                    </div>
                `;
                return;
            }

            const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            const balance = income - expense;

            const maxVal = Math.max(income, expense, Math.abs(balance), 1);
            const incomeH = (income / maxVal) * 180;
            const expenseH = (expense / maxVal) * 180;
            const balanceH = (Math.abs(balance) / maxVal) * 180;

            container.innerHTML = `
                <div class="chart-bar-wrapper">
                    <div class="chart-value">${formatMoney(income)}</div>
                    <div class="chart-bar income" style="height: ${incomeH}px;"></div>
                    <div class="chart-label">Приходи</div>
                </div>
                <div class="chart-bar-wrapper">
                    <div class="chart-value">${formatMoney(expense)}</div>
                    <div class="chart-bar expense" style="height: ${expenseH}px;"></div>
                    <div class="chart-label">Разходи</div>
                </div>
                <div class="chart-bar-wrapper">
                    <div class="chart-value">${formatMoney(balance)}</div>
                    <div class="chart-bar balance" style="height: ${balanceH}px;"></div>
                    <div class="chart-label">Баланс</div>
                </div>
            `;
        }

        // ========== HELPERS ==========
        function formatMoney(amount) {
            return amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + ' лв.';
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('bg-BG', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
